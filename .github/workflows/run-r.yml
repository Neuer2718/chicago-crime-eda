name: Run R Script

on: [push]

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-${{ hashFiles('**/run-r.yml') }}
          restore-keys: ${{ runner.os }}-r-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install R packages
        run: |
          Rscript -e "install.packages(c('tidyverse', 'lubridate'), repos = 'https://cloud.r-project.org')"

      - name: Download Chicago Crime data
        run: |
          curl -L \
            -H "Accept: text/csv" \
            -o "Crimes_-_2001_to_Present.csv" \
            "https://data.cityofchicago.org/resource/ijzp-q8t2.csv?%24limit=10000"

      - name: Run script
        run: Rscript chicago-crime-project.R
