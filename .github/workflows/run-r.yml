# .github/workflows/run-r.yml
name: Run R Script

on: [push]

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      - name: Install dependencies
        run: Rscript -e "install.packages(c('ggplot2', 'dplyr', 'lubridate'))"
      - name: Run script
        run: Rscript chicago-crime-project.R
