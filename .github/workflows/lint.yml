# .github/workflows/lint.yml
name: Lint R Code

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      - name: Install lintr
        run: Rscript -e "install.packages('lintr')"
      - name: Lint
        run: Rscript -e "lintr::lint_dir('.')"
